name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint = tsc + eslint ; toujours avant build (piège .output/, cf. KNOWN_ISSUES)
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm build

  skills-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # exit 2 si une skill upstream a dérivé de skills-lock.json
      - run: node scripts/sync-skills.mjs --check

  changelog:
    # Changelog entry mandatory on every PR (CLAUDE.md § Pre-PR doc audit, q.5).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a new changelog entry at the top
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          file=CHANGELOG_PRODUIT.md
          # The newest versioned entry (top `## vX.Y.Z`) must be new in this PR.
          head_top=$(grep -m1 -E '^## v[0-9]+\.[0-9]+\.[0-9]+ ' "$file" || true)
          if [ -z "$head_top" ]; then
            echo "::error file=$file::No versioned entry (## vX.Y.Z) found in $file."
            exit 1
          fi
          if git show "$BASE_SHA:$file" 2>/dev/null | grep -Fxq "$head_top"; then
            echo "::error file=$file::This PR adds no new changelog entry. Add a '## vX.Y.Z — JJ/MM/AAAA à HH:MM — titre' line at the top of $file (CLAUDE.md § Pre-PR doc audit, q.5)."
            exit 1
          fi
          echo "New top changelog entry: $head_top"

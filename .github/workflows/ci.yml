name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint = tsc + eslint ; toujours avant build (piège .output/, cf. KNOWN_ISSUES)
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm build

  skills-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # exit 2 si une skill upstream a dérivé de skills-lock.json
      - run: node scripts/sync-skills.mjs --check

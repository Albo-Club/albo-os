name: Cleanup merged branches

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # Deletes every branch whose PR is merged. Branches with an open PR
      # or no PR at all are left untouched.
      - name: Delete branches of merged PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 --json headRefName --jq '.[].headRefName')
          gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 200 --json headRefName --jq '.[].headRefName' \
            | sort -u | while read -r branch; do
            [ -z "$branch" ] && continue
            [ "$branch" = "main" ] && continue
            if printf '%s\n' "$open" | grep -qxF "$branch"; then
              echo "keep   $branch (open PR)"
              continue
            fi
            if gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch" --silent 2>/dev/null; then
              echo "delete $branch"
            else
              echo "skip   $branch (already gone)"
            fi
          done
